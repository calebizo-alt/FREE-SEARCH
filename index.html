<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>free-search</title>
<style>
body{
  background:#111;
  background-size:cover;
  background-position:center;
  min-height:100vh;
  font-family:Arial,sans-serif;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
h1{font-size:48px;margin-bottom:20px;}
.search-box{display:flex;gap:10px;margin-bottom:20px;}
.search-box input{padding:12px;font-size:16px;border-radius:8px;border:none;width:300px;}
.search-btn{padding:12px 20px;background:#4285f4;border:none;border-radius:8px;color:white;cursor:pointer;}
#musicBtn, #musicToggleBtn{position:fixed;top:15px;width:50px;height:50px;border:none;border-radius:50%;color:white;font-size:26px;cursor:pointer;}
#musicBtn{right:15px;background:purple;}
#musicToggleBtn{left:15px;background:#1db954;}
</style>
</head>
<body>

<h1>free-search</h1>

<div class="search-box">
  <input id="searchInput" placeholder="Search or type website...">
  <button class="search-btn" onclick="search()">Search</button>
</div>

<!-- Music upload -->
<button id="musicBtn" onclick="pickMusic()">🎵</button>
<input type="file" id="musicInput" accept="audio/mp3" hidden>
<audio id="bgMusic" loop></audio>

<!-- Play/pause button -->
<button id="musicToggleBtn" onclick="toggleMusic()">▶️</button>

<script>
// Search function (simple Google redirect)
function search(){
  const input = document.getElementById("searchInput").value.trim();
  if(!input) return;
  let url = /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}$/i.test(input) ? input : "https://www.google.com/search?q=" + encodeURIComponent(input);
  if(!url.startsWith("http")) url = "https://" + url;
  window.open(url,"_blank"); // open in new tab to keep music alive
}

// Music upload
const audio = document.getElementById("bgMusic");
const musicInput = document.getElementById("musicInput");

function pickMusic(){ musicInput.click(); }

musicInput.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.play();
  localStorage.setItem("musicSrc", url);
  localStorage.setItem("musicTime", 0);
  localStorage.setItem("isPaused", "false");
  document.getElementById("musicToggleBtn").innerText = "⏸️";
});

// Play/pause toggle
function toggleMusic(){
  let pausedTime = parseFloat(localStorage.getItem("musicTime")||"0");
  let isPaused = localStorage.getItem("isPaused")==="true";

  if(audio.src==="") return;

  if(isPaused){
    // Resume
    audio.currentTime = pausedTime;
    audio.play();
    document.getElementById("musicToggleBtn").innerText = "⏸️";
    localStorage.setItem("isPaused","false");
  } else {
    // Pause
    localStorage.setItem("musicTime", audio.currentTime);
    audio.pause();
    document.getElementById("musicToggleBtn").innerText = "▶️";
    localStorage.setItem("isPaused","true");
  }
}

// Auto-save current time
audio.addEventListener("timeupdate", ()=>{
  if(!audio.paused) localStorage.setItem("musicTime", audio.currentTime);
});

// On page load: restore music
window.addEventListener("load", ()=>{
  const src = localStorage.getItem("musicSrc");
  const time = parseFloat(localStorage.getItem("musicTime")||"0");
  const paused = localStorage.getItem("isPaused")==="true";

  if(src){
    audio.src = src;
    audio.currentTime = time;
    if(!paused) audio.play();
    document.getElementById("musicToggleBtn").innerText = paused?"▶️":"⏸️";
  }
});
</script>

</body>
</html>
