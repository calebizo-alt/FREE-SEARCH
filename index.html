<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>free-search</title>

<link rel="manifest" href="manifest.json">  

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container{
  width:100%;
  max-width:900px;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:20px;
}

.title-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.title-container h3{
  color:#aaa;
  font-size:18px;
  margin-bottom:5px;
}

h1{
  font-size:48px;
}

/* search */
.search-box{
  display:flex;
  gap:10px;
  width:100%;
  max-width:600px;
}

.search-box input{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:18px;
}

.search-btn{
  padding:16px 24px;
  border:none;
  border-radius:12px;
  background:#4285f4;
  color:white;
  cursor:pointer;
}

/* shortcuts */
.shortcuts-header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.add-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#34a853;
  color:white;
  font-size:26px;
  cursor:pointer;
}

.shortcuts{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.shortcut{
  background:rgba(255,255,255,0.9);
  padding:15px;
  border-radius:12px;
  min-width:140px;
  cursor:pointer;
  color:black;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modal-content{
  background:#202124;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  color:white;
}

.modal-content input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3c4043;
  color:white;
}

.modal-buttons{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
}

/* clock */
#clock{
  position:fixed;
  bottom:15px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:10px 15px;
  border-radius:12px;
}

/* wallpaper button */
.wallpaper-btn{
  position:fixed;
  top:15px;
  right:15px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:red;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* music button */
#musicBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:purple;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* settings */
#settingsBtn{
  position:fixed;
  bottom:15px;
  left:15px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#555;
  color:white;
  font-size:22px;
  cursor:pointer;
  z-index:9999;
}

/* brain */
#brainBtn{
  position:fixed;
  top:50%;
  right:15px;
  transform:translateY(-50%);
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:#222;
  color:white;
  font-size:26px;
  cursor:pointer;
  z-index:9999;
}

#brainPanel{
  position:fixed;
  top:50%;
  right:80px;
  transform:translateY(-50%);
  width:300px;
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  display:none;
  z-index:9999;
}

#brainPanel input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

#brainResult{
  margin-top:10px;
  font-size:14px;
  color:#ddd;
  max-height:200px;
  overflow:auto;
}

/* MOBILE VERSION */
@media screen and (max-width: 768px) {
  /* Hide extra elements */
  .shortcuts-header,
  #shortcuts,
  .wallpaper-btn,
  #clock,
  #musicBtn,
  #settingsBtn,
  #brainBtn,
  #brainPanel,
  .modal {
    display: none !important;
  }

  /* Center everything */
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    gap: 20px;
    text-align: center;
    width: 90%;
    max-width: 400px;
  }

  /* Stack search vertically */
  .search-box {
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .search-box input,
  .search-btn {
    width: 100%;
    font-size: 16px;
    padding: 14px;
  }

  h1 {
    font-size: 36px;
  }

  .title-container h3 {
    font-size: 16px;
    margin-bottom: 5px;
  }
}
</style>
</head>
