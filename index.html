

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>free-search</title>

<link rel="manifest" href="manifest.json">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* container */
.container{
  width:100%;
  max-width:900px;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:20px;
}

/* title */
h1{
  font-size:48px;
}

/* search */
.search-box{
  display:flex;
  gap:10px;
  width:100%;
  max-width:600px;
}

.search-box input{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:18px;
}

.search-btn{
  padding:16px 24px;
  border:none;
  border-radius:12px;
  background:#4285f4;
  color:white;
  cursor:pointer;
}

/* shortcuts */
.shortcuts-header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.add-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#34a853;
  color:white;
  font-size:26px;
  cursor:pointer;
}

.shortcuts{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.shortcut{
  background:rgba(255,255,255,0.9);
  padding:15px;
  border-radius:12px;
  min-width:140px;
  cursor:pointer;
  color:black;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modal-content{
  background:#202124;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  color:white;
}

.modal-content input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3c4043;
  color:white;
}

.modal-buttons{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
}

/* clock */
#clock{
  position:fixed;
  bottom:15px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:10px 15px;
  border-radius:12px;
}

/* wallpaper */
.wallpaper-btn{
  position:fixed;
  top:15px;
  right:15px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:red;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* music */
#musicBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:purple;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* SETTINGS BUTTON */
#settingsBtn{
  position:fixed;
  bottom:15px;
  left:15px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#555;
  color:white;
  font-size:22px;
  cursor:pointer;
  z-index:9999;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>free-search (by caleb plaatjies)</h1>

<div class="search-box">
  <input id="searchInput" placeholder="Search or type website...">
  <button class="search-btn" onclick="search()">Search</button>
</div>

<div class="shortcuts-header">
  <button class="add-btn" onclick="openModal()">+</button>
</div>

<div id="shortcuts" class="shortcuts"></div>

</div>

<!-- WALLPAPER -->
<button class="wallpaper-btn" onclick="chooseWallpaper()">+</button>
<input type="file" id="wallpaperInput" accept="image/*" hidden>

<!-- CLOCK -->
<div id="clock"></div>

<!-- MUSIC -->
<input type="file" id="musicInput" accept="audio/mp3" hidden>
<audio id="bgMusic" loop></audio>
<button id="musicBtn" onclick="pickMusic()">+</button>

<!-- SETTINGS -->
<button id="settingsBtn" onclick="openSettings()">⚙️</button>

<!-- MODALS -->

<div class="modal" id="modal">
  <div class="modal-content">

    <h2>Add shortcut</h2>

    <input id="shortcutName" placeholder="Name">
    <input id="shortcutURL" placeholder="URL">

    <div class="modal-buttons">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="addShortcut()">Done</button>
    </div>

  </div>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">

    <h2>Clock Settings</h2>

    <select id="timezoneSelect">
      <option value="Africa/Johannesburg">South Africa</option>
      <option value="UTC">UTC</option>
      <option value="Europe/London">London</option>
      <option value="America/New_York">New York</option>
      <option value="Asia/Dubai">Dubai</option>
      <option value="Asia/Tokyo">Tokyo</option>
    </select>

    <div class="modal-buttons">
      <button onclick="closeSettings()">Close</button>
      <button onclick="saveTimezone()">Save</button>
    </div>

  </div>
</div>

<script>

/* SHORTCUTS */
let shortcuts = [
  { name:"Google", url:"https://google.com" },
  { name:"YouTube", url:"https://youtube.com" }
];

let timezone = "Africa/Johannesburg";

/* LOAD */
function load(){
  const s = localStorage.getItem("shortcuts");
  if(s) shortcuts = JSON.parse(s);

  const t = localStorage.getItem("timezone");
  if(t) timezone = t;
}

/* SAVE */
function save(){
  localStorage.setItem("shortcuts", JSON.stringify(shortcuts));
}

/* RENDER */
function render(){
  const box = document.getElementById("shortcuts");
  box.innerHTML = "";

  shortcuts.forEach(s=>{
    box.innerHTML += `
      <div class="shortcut" onclick="go('${s.url}')">
        <b>${s.name}</b><br>
        <small>${s.url}</small>
      </div>
    `;
  });
}

function go(url){
  window.location.href = url;
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function addShortcut(){
  let name = document.getElementById("shortcutName").value;
  let url = document.getElementById("shortcutURL").value;

  if(!url.startsWith("http")) url = "https://" + url;

  shortcuts.push({ name, url });
  save();
  render();
  closeModal();
}

/* SEARCH */
function search(){
  const input = document.getElementById("searchInput").value.trim();
  if(!input) return;

  const isSite = /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}$/i;

  if(isSite.test(input)){
    let url = input;
    if(!url.startsWith("http")) url = "https://" + url;
    window.location.href = url;
    return;
  }

  window.location.href =
    "https://www.google.com/search?q=" + encodeURIComponent(input);
}

/* CLOCK */
function updateClock(){
  const time = new Intl.DateTimeFormat("en-GB", {
    timeZone: timezone,
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:false
  }).format(new Date());

  document.getElementById("clock").innerText = time;
}
setInterval(updateClock,1000);

/* SETTINGS */
function openSettings(){
  document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
  document.getElementById("settingsModal").style.display="none";
}

function saveTimezone(){
  timezone = document.getElementById("timezoneSelect").value;
  localStorage.setItem("timezone", timezone);
  closeSettings();
  updateClock();
}

/* WALLPAPER */
function chooseWallpaper(){
  document.getElementById("wallpaperInput").click();
}

document.getElementById("wallpaperInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    document.body.style.backgroundImage = `url(${ev.target.result})`;
  };
  reader.readAsDataURL(file);
});

/* MUSIC */
function pickMusic(){
  document.getElementById("musicInput").click();
}

document.getElementById("musicInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const audio = document.getElementById("bgMusic");
  audio.src = URL.createObjectURL(file);
  audio.play();
});

/* INIT */
load();
render();
updateClock();

</script>

</body>
</html>
